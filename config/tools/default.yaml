# =============================================================================
# Default Tool Registry
# =============================================================================
# Tools the sentinel knows about. Each tool declares its required capability
# and a JSON schema for its arguments. Unknown tools are denied by default.
# =============================================================================

tools:
  - name: http.get
    capability: net.http
    sensitive: false
    arg_schema:
      type: object
      required: [url]
      additionalProperties: false
      properties:
        url: { type: string, format: uri }
        headers: { type: object, additionalProperties: { type: string } }
        timeout_ms: { type: integer, minimum: 1, maximum: 60000 }

  - name: http.post
    capability: net.http
    sensitive: false
    arg_schema:
      type: object
      required: [url]
      additionalProperties: false
      properties:
        url: { type: string, format: uri }
        body: { type: string }
        headers: { type: object, additionalProperties: { type: string } }
        timeout_ms: { type: integer, minimum: 1, maximum: 60000 }

  - name: fs.read
    capability: fs.read
    sensitive: false
    arg_schema:
      type: object
      required: [path]
      additionalProperties: false
      properties:
        path: { type: string }

  - name: fs.write
    capability: fs.write
    sensitive: true
    arg_schema:
      type: object
      required: [path, content]
      additionalProperties: false
      properties:
        path: { type: string }
        content: { type: string }

  - name: shell.exec
    capability: code.exec
    sensitive: true
    arg_schema:
      type: object
      required: [command]
      additionalProperties: false
      properties:
        command: { type: string, minLength: 1 }
        timeout_ms: { type: integer, minimum: 1, maximum: 60000 }

  - name: finance.transfer
    capability: finance.write
    sensitive: true
    arg_schema:
      type: object
      required: [amount, currency, destination]
      additionalProperties: false
      properties:
        amount: { type: number, exclusiveMinimum: 0 }
        currency: { type: string, pattern: "^[A-Z]{3}$" }
        destination: { type: string, minLength: 1 }
        memo: { type: string, maxLength: 256 }

  - name: secrets.read
    capability: secrets.read
    sensitive: true
    arg_schema:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1 }

  - name: infra.deploy
    capability: infra.write
    sensitive: true
    arg_schema:
      type: object
      required: [target, version]
      additionalProperties: false
      properties:
        target: { type: string }
        version: { type: string }
        dry_run: { type: boolean }

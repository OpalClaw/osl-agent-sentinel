name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c  # v5.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: python -m ruff check src tests
      - name: Format (black --check)
        run: python -m black --check src tests
      - name: Type check (mypy)
        run: python -m mypy src
      - name: Tests
        run: python -m pytest tests/ -q --tb=short

  rust:
    name: Rust stable
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dtolnay/rust-toolchain@439cf607258077187679211f12aa6f19af4a0af7  # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@a95ba195448af2da9b00fb742d14ffaaf3c21f43  # v2.7.0
        with:
          workspaces: sentinel-engine
      - name: Format check
        run: cd sentinel-engine && cargo fmt --all -- --check
      - name: Clippy
        run: cd sentinel-engine && cargo clippy --lib --tests -- -D warnings
      - name: Tests
        run: cd sentinel-engine && cargo test --lib

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [python, rust]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226  # v3.0.0
      - name: Build (no push)
        uses: docker/build-push-action@4a13e500e55cf31b7a5d59a38ab2040ab0f42f56  # v5.1.0
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: osl-agent-sentinel:ci

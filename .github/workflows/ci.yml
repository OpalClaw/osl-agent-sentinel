name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint (Ruff)
        run: ruff check src tests
      - name: Format check (Black)
        run: black --check src tests
      - name: Type check (mypy)
        run: mypy --strict src
      - name: Test (pytest)
        run: pytest tests/unit tests/integration --cov=sentinel --cov-report=xml --cov-report=term
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  rust:
    name: Rust ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sentinel-engine
      - name: Format check
        run: cargo fmt --manifest-path sentinel-engine/Cargo.toml --all -- --check
      - name: Clippy
        run: cargo clippy --manifest-path sentinel-engine/Cargo.toml --all-targets -- -D warnings
      - name: Test
        run: cargo test --manifest-path sentinel-engine/Cargo.toml --all-features

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [python, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: osl-agent-sentinel:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
